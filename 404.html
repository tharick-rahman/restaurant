<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | Stackly</title>

<style>

/* Reset */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* Page */

body{
background:#040404;
color:#f5f5f5;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* Container */

.error-container{
max-width:600px;
padding:40px;
}

/* 404 number */

.error-code{
font-size:120px;
font-weight:700;
color:#f1c46b;
letter-spacing:5px;
}

/* Title */

.error-title{
font-size:28px;
margin-top:10px;
margin-bottom:10px;
}

/* Text */

.error-text{
color:#b6b1a8;
font-size:16px;
line-height:1.6;
margin-bottom:30px;
}

/* Button */

.home-btn{
display:inline-block;
padding:12px 28px;
background:#f1c46b;
color:#040404;
text-decoration:none;
font-weight:600;
border-radius:30px;
transition:0.3s;
}

.home-btn:hover{
background:#d4a94e;
transform:translateY(-3px);
}

/* Small decoration */

.gold-line{
width:80px;
height:3px;
background:#f1c46b;
margin:20px auto;
}

</style>

</head>

<body>

<div class="error-container">

<div class="error-code">404</div>

<div class="gold-line"></div>

<h1 class="error-title">Page Not Found</h1>

<p class="error-text">
Sorry, the page you are looking for doesn’t exist or may have been moved.
Return to our homepage and continue exploring the flavors of Stackly Restaurant.
</p>

<a href="index.html" class="home-btn">Back to Home</a>

</div>

</body>
</html>
